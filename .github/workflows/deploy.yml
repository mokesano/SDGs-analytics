name: Deploy Workflow

on:
  push:
    branches: [ "develop", "master", "production" ]

permissions:
  contents: read

jobs:
  # ── Build & Validate ─────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php82-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php82-composer-

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: PHP Syntax Check
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} +

      - name: Apply & Validate SQLite Schema
        run: |
          mkdir -p database
          php -r "
            \$db = new PDO('sqlite:database/wizdam.db');
            \$db->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
            \$db->exec(file_get_contents('database/schema.sql'));
            echo 'Schema applied successfully.' . PHP_EOL;
          "

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.ref_name }})
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php82-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php82-composer-

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy to Dev Server
        if: github.ref_name == 'develop'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEV_HOST }}
          DEPLOY_USER: ${{ secrets.DEV_USER }}
          DEPLOY_PATH: ${{ secrets.DEV_PATH }}
        run: bash scripts/deploy-dev.sh

      - name: Deploy to Staging
        if: github.ref_name == 'master'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_PATH }}
        run: bash scripts/deploy-staging.sh

      - name: Deploy to Production
        if: github.ref_name == 'production'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_PATH }}
        run: bash scripts/deploy-prod.sh
